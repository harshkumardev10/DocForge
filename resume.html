<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ResumeForge — Professional Resume Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@400;500;600;700&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#1a56db; --accent-dark:#1e3a8a; --accent-light:#eff6ff; --accent-soft:#bfdbfe;
  --header-bg:#1a56db; --header-text:#ffffff; --body-font:'Inter',sans-serif;
}
body{font-family:'Inter',sans-serif;background:#f0f4f8;color:#1e293b;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.navbar{background:#fff;border-bottom:1px solid #e2e8f0;padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;z-index:100;flex-shrink:0}
.nav-left{display:flex;align-items:center;gap:18px}
.nav-logo{display:flex;align-items:center;gap:10px}
.nav-logo svg{width:32px;height:32px}
.nav-logo-text{font-size:20px;font-weight:700;color:var(--accent)}
.back-link{font-size:12px;color:#6b7280;text-decoration:none}
.back-link:hover{color:var(--accent)}
.nav-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-family:'Inter',sans-serif;font-size:13px;font-weight:500;transition:all .2s;display:flex;align-items:center;gap:6px}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{filter:brightness(0.9)}
.btn-outline{background:#fff;color:#374151;border:1px solid #d1d5db}
.btn-outline:hover{background:#f9fafb}
.btn-sm{padding:6px 12px;font-size:12px}
.theme-select{border:1px solid #d1d5db;border-radius:8px;padding:6px 10px;font-family:'Inter',sans-serif;font-size:12px;color:#374151;background:#fff;cursor:pointer}
.main{display:flex;flex:1;overflow:hidden}
.left-panel{width:50%;background:#f0f4f8;overflow-y:auto;padding:20px}
.card{background:#fff;border-radius:12px;border:1px solid #e2e8f0;padding:20px;margin-bottom:16px}
.card-title{font-size:13px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.6px;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid #f1f5f9;display:flex;justify-content:space-between;align-items:center}
.form-row{display:flex;gap:12px;margin-bottom:12px}
.form-group{flex:1;display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:12px;font-weight:500;color:#374151}
.form-group input,.form-group textarea,.form-group select{border:1px solid #d1d5db;border-radius:8px;padding:8px 12px;font-family:'Inter',sans-serif;font-size:13px;color:#1e293b;outline:none;transition:border-color .2s;background:#fff;width:100%}
.form-group input:focus,.form-group textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(26,86,219,.08)}
.form-group textarea{resize:vertical;min-height:60px}
.block-item{border:1px solid #e2e8f0;border-radius:10px;padding:14px;margin-bottom:10px;position:relative}
.block-item .btn-del{position:absolute;top:10px;right:10px}
.btn-del{background:#fee2e2;color:#dc2626;border:none;border-radius:6px;width:26px;height:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px}
.btn-del:hover{background:#dc2626;color:#fff}
.add-row-btn{margin-top:6px;background:var(--accent-light);color:var(--accent);border:1px dashed var(--accent-soft);border-radius:8px;padding:8px 14px;cursor:pointer;font-size:13px;font-weight:500;width:100%;font-family:'Inter',sans-serif}
.right-panel{width:50%;background:#94a3b8;overflow-y:auto;padding:24px;display:flex;justify-content:center}
.resume-preview{background:#fff;width:794px;min-height:1123px;box-shadow:0 10px 40px rgba(0,0,0,.2);font-family:var(--body-font);color:#1e293b}

/* ---- CLASSIC theme: blue header band, two-column-ish ---- */
.r-header{background:var(--header-bg);color:var(--header-text);padding:32px 40px}
.r-name{font-size:30px;font-weight:800}
.r-title{font-size:14px;color:var(--accent-soft);margin-top:4px;font-weight:500}
.r-contact{display:flex;gap:14px;flex-wrap:wrap;margin-top:12px;font-size:11px;color:var(--accent-soft)}
.r-body{padding:28px 40px}
.r-section{margin-bottom:20px}
.r-section-title{font-size:12px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid var(--accent)}
.r-summary{font-size:12.5px;line-height:1.7;color:#374151}
.r-entry{margin-bottom:14px}
.r-entry-top{display:flex;justify-content:space-between;align-items:baseline}
.r-entry-role{font-size:13.5px;font-weight:700;color:#1e293b}
.r-entry-org{font-size:12.5px;color:var(--accent);font-weight:600}
.r-entry-date{font-size:11px;color:#94a3b8;white-space:nowrap}
.r-entry-desc{font-size:12px;color:#475569;line-height:1.6;margin-top:4px}
.r-entry-desc ul{margin:0;padding-left:18px}
.r-entry-desc li{margin-bottom:3px}
.r-skills{display:flex;flex-wrap:wrap;gap:8px}
.r-skill-pill{background:var(--accent-light);color:var(--accent);font-size:11px;font-weight:600;padding:5px 12px;border-radius:20px}

/* ---- MODERN theme: sidebar layout ---- */
body.theme-modern .resume-preview{display:flex;min-height:1123px}
body.theme-modern .r-sidebar{width:34%;background:var(--header-bg);color:#fff;padding:32px 24px}
body.theme-modern .r-name{font-size:24px;font-weight:700}
body.theme-modern .r-title{color:var(--accent-soft);font-size:12px;margin-top:4px}
body.theme-modern .r-contact{flex-direction:column;gap:8px;margin-top:20px;color:#cbd5e1}
body.theme-modern .r-sidebar .r-section-title{color:#fff;border-bottom:1px solid rgba(255,255,255,.25);font-size:11px}
body.theme-modern .r-sidebar .r-skill-pill{background:rgba(255,255,255,.12);color:#fff}
body.theme-modern .r-main{width:66%;padding:32px 28px}
body.theme-modern .r-header,body.theme-modern .r-body{padding:0;background:none}

/* ---- MINIMAL theme: serif, no color blocks, all black/grey ---- */
body.theme-minimal{
  --accent:#111827; --accent-dark:#111827; --accent-light:#f9fafb; --accent-soft:#6b7280;
  --header-bg:#ffffff; --header-text:#111827; --body-font:'Merriweather',serif;
}
body.theme-minimal .r-header{border-bottom:2px solid #111827;padding:30px 40px 20px}
body.theme-minimal .r-name{font-weight:700;font-size:26px;letter-spacing:.5px}
body.theme-minimal .r-section-title{border-bottom:1px solid #111827;font-family:'Inter',sans-serif}
body.theme-minimal .r-skill-pill{background:#f3f4f6;color:#111827;border-radius:4px}
body.theme-minimal .r-entry-org{color:#111827}

/* ---- ATS theme: plain black & white, centered header, bullet-style, ATS-safe ---- */
body.theme-ats{
  --accent:#000000; --accent-dark:#000000; --accent-light:#f3f4f6; --accent-soft:#374151;
  --header-bg:#ffffff; --header-text:#000000; --body-font:'Inter',sans-serif;
}
body.theme-ats .r-header{padding:36px 44px 18px;text-align:center}
body.theme-ats .r-name{font-size:34px;font-weight:800;letter-spacing:1px}
body.theme-ats .r-title{color:#000;font-weight:700;font-size:13px;margin-top:6px}
body.theme-ats .r-contact{justify-content:center;color:#374151;font-size:12px;margin-top:8px}
body.theme-ats .r-body{padding:8px 44px 36px}
body.theme-ats .r-section-title{font-size:18px;font-weight:800;color:#000;border-bottom:1px solid #000;letter-spacing:.5px;text-transform:uppercase;padding-bottom:4px;margin-bottom:12px}
body.theme-ats .r-summary{font-size:13px}
body.theme-ats .r-entry-role{font-size:14px}
body.theme-ats .r-entry-org{color:#000;font-weight:700}
body.theme-ats .r-skill-pill{background:none;color:#000;padding:0;font-weight:400;border-radius:0}
body.theme-ats .r-skills{display:block}
body.theme-ats .r-skill-pill:not(:last-child)::after{content:", "}

@media(max-width:900px){
  .main{flex-direction:column}
  .left-panel,.right-panel{width:100%}
  .right-panel{min-height:600px}
  .resume-preview{width:100%;min-height:auto}
  body.theme-modern .resume-preview{flex-direction:column}
  body.theme-modern .r-sidebar,body.theme-modern .r-main{width:100%}
}
.left-panel::-webkit-scrollbar,.right-panel::-webkit-scrollbar{width:6px}
.left-panel::-webkit-scrollbar-thumb,.right-panel::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
</style>
</head>
<body class="theme-classic">

<nav class="navbar">
  <div class="nav-left">
    <div class="nav-logo">
      <svg viewBox="0 0 32 32" fill="none">
        <rect width="32" height="32" rx="8" fill="#1a56db"/>
        <path d="M9 9h14v3H9zM9 14h14v2H9zM9 18h9v2H9z" fill="#fff"/>
        <circle cx="23" cy="22" r="4.5" fill="#fff"/>
        <path d="M21.3 22l1.2 1.2 2.2-2.6" stroke="#1a56db" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
      <span class="nav-logo-text" href="index.html">ResumeForge</span>
    </div>
    <a class="back-link" href="index.html">← All Templates</a>
    <a class="back-link" href="invoice.html">Invoice Generator →</a>
  </div>
  <div class="nav-right">
    <select class="theme-select" id="themeSelect" onchange="switchTheme(this.value)">
      <option value="classic">Classic</option>
      <option value="modern">Modern (Sidebar)</option>
      <option value="minimal">Minimal</option>
      <option value="ats">ATS-Friendly</option>
    </select>
    <button class="btn btn-outline btn-sm" onclick="newResume()">＋ New</button>
    <button class="btn btn-outline btn-sm" onclick="exportPNG()">🖼 PNG</button>
    <button class="btn btn-outline btn-sm" onclick="printResume()">🖨 Print</button>
    <button class="btn btn-primary btn-sm" onclick="exportPDF()">⬇ Save PDF</button>
  </div>
</nav>

<div class="main">

  <div class="left-panel">

    <div class="card">
      <div class="card-title">Personal Details</div>
      <div class="form-row">
        <div class="form-group"><label>Full Name</label><input id="fullName" oninput="update()" placeholder="Jordan Reyes"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Professional Title</label><input id="jobTitle" oninput="update()" placeholder="Senior Product Designer"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Email</label><input id="email" oninput="update()" placeholder="jordan@email.com"></div>
        <div class="form-group"><label>Phone</label><input id="phone" oninput="update()" placeholder="+1 (555) 000-0000"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Location</label><input id="location" oninput="update()" placeholder="Austin, TX"></div>
        <div class="form-group"><label>Website / LinkedIn</label><input id="website" oninput="update()" placeholder="linkedin.com/in/jordan"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Summary</div>
      <div class="form-group">
        <textarea id="summary" oninput="update()" placeholder="A short 2-3 sentence professional summary highlighting your strengths and experience..."></textarea>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Experience <button class="btn btn-outline btn-sm" onclick="addExp()" style="padding:4px 10px">＋ Add</button></div>
      <div id="expBody"></div>
    </div>

    <div class="card">
      <div class="card-title">Education <button class="btn btn-outline btn-sm" onclick="addEdu()" style="padding:4px 10px">＋ Add</button></div>
      <div id="eduBody"></div>
    </div>

    <div class="card">
      <div class="card-title">Skills</div>
      <div class="form-group">
        <input id="skills" oninput="update()" placeholder="Figma, UX Research, Design Systems, Prototyping (comma separated)">
      </div>
    </div>

    <div class="card">
      <div class="card-title">Certifications <button class="btn btn-outline btn-sm" onclick="addCert()" style="padding:4px 10px">＋ Add</button></div>
      <div id="certBody"></div>
    </div>

    <div class="card">
      <div class="card-title">✅ ATS Checker</div>
      <div class="form-group" style="margin-bottom:10px">
        <label>Paste a job description (optional, improves keyword match scoring)</label>
        <textarea id="jobDesc" placeholder="Paste the job listing here to check how well your resume matches it..." style="min-height:100px"></textarea>
      </div>
      <button class="btn btn-primary btn-sm" onclick="runATSCheck()" style="width:100%;justify-content:center">Run ATS Check</button>
      <div id="atsResults" style="margin-top:14px;display:none"></div>
    </div>

  </div>

  <div class="right-panel">
    <div class="resume-preview" id="resumePreview">

      <div class="r-sidebar" id="rSidebar">
        <div class="r-name" id="pName">Your Name</div>
        <div class="r-title" id="pTitle">Professional Title</div>
        <div class="r-contact" id="pContact"></div>
        <div class="r-section" style="margin-top:24px">
          <div class="r-section-title">Skills</div>
          <div class="r-skills" id="pSkillsSidebar"></div>
        </div>
        <div class="r-section" id="eduSidebarSection">
          <div class="r-section-title">Education</div>
          <div id="pEduSidebar"></div>
        </div>
        <div class="r-section" id="certSidebarSection">
          <div class="r-section-title">Certifications</div>
          <div id="pCertSidebar"></div>
        </div>
      </div>

      <div class="r-main" id="rMain">
        <div class="r-header" id="rHeaderBlock">
          <div class="r-name" id="pName2">Your Name</div>
          <div class="r-title" id="pTitle2">Professional Title</div>
          <div class="r-contact" id="pContact2"></div>
        </div>
        <div class="r-body">
          <div class="r-section">
            <div class="r-section-title">Summary</div>
            <div class="r-summary" id="pSummary">—</div>
          </div>
          <div class="r-section">
            <div class="r-section-title">Experience</div>
            <div id="pExp"></div>
          </div>
          <div class="r-section" id="eduMainSection">
            <div class="r-section-title">Education</div>
            <div id="pEdu"></div>
          </div>
          <div class="r-section" id="skillsMainSection">
            <div class="r-section-title">Skills</div>
            <div class="r-skills" id="pSkillsMain"></div>
          </div>
          <div class="r-section" id="certMainSection">
            <div class="r-section-title">Certifications</div>
            <div id="pCert"></div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
const THEME_LIST = ['classic','modern','minimal','ats'];

function switchTheme(theme, pushUrl = true) {
  if (!THEME_LIST.includes(theme)) theme = 'classic';
  document.body.className = 'theme-' + theme;
  document.getElementById('themeSelect').value = theme;
  if (pushUrl) {
    const url = new URL(window.location);
    url.searchParams.set('theme', theme);
    window.history.replaceState({}, '', url);
  }
}

function getInitialTheme() {
  const params = new URLSearchParams(window.location.search);
  const t = params.get('theme');
  return THEME_LIST.includes(t) ? t : 'classic';
}

let expRows = [], eduRows = [], certRows = [];
let nextExpId = 1, nextEduId = 1, nextCertId = 1;

function init() {
  switchTheme(getInitialTheme(), false);
  addExp(); addExp();
  addEdu();
  addCert();
  update();
}

function addExp() {
  expRows.push({id: nextExpId++, role:'', org:'', dates:'', desc:''});
  renderExp();
}
function removeExp(id) { expRows = expRows.filter(r=>r.id!==id); renderExp(); }
function renderExp() {
  const el = document.getElementById('expBody');
  el.innerHTML = '';
  expRows.forEach(r => {
    const div = document.createElement('div');
    div.className = 'block-item';
    div.innerHTML = `
      <button class="btn-del" onclick="removeExp(${r.id})">×</button>
      <div class="form-row">
        <div class="form-group"><label>Role</label><input value="${r.role}" oninput="expChange(${r.id},'role',this.value)" placeholder="Product Designer"></div>
        <div class="form-group"><label>Company</label><input value="${r.org}" oninput="expChange(${r.id},'org',this.value)" placeholder="Acme Inc."></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Dates</label><input value="${r.dates}" oninput="expChange(${r.id},'dates',this.value)" placeholder="Jan 2022 – Present"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Description (one bullet per line)</label><textarea oninput="expChange(${r.id},'desc',this.value)" placeholder="Led redesign of core product, improving retention by 18%">${r.desc}</textarea></div>
      </div>
    `;
    el.appendChild(div);
  });
}
function expChange(id, field, val) {
  const r = expRows.find(x=>x.id===id);
  if (r) { r[field]=val; update(); }
}

function addEdu() {
  eduRows.push({id: nextEduId++, degree:'', school:'', dates:''});
  renderEdu();
}
function removeEdu(id) { eduRows = eduRows.filter(r=>r.id!==id); renderEdu(); }
function renderEdu() {
  const el = document.getElementById('eduBody');
  el.innerHTML = '';
  eduRows.forEach(r => {
    const div = document.createElement('div');
    div.className = 'block-item';
    div.innerHTML = `
      <button class="btn-del" onclick="removeEdu(${r.id})">×</button>
      <div class="form-row">
        <div class="form-group"><label>Degree</label><input value="${r.degree}" oninput="eduChange(${r.id},'degree',this.value)" placeholder="B.A. Graphic Design"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>School</label><input value="${r.school}" oninput="eduChange(${r.id},'school',this.value)" placeholder="State University"></div>
        <div class="form-group"><label>Dates</label><input value="${r.dates}" oninput="eduChange(${r.id},'dates',this.value)" placeholder="2016 – 2020"></div>
      </div>
    `;
    el.appendChild(div);
  });
}
function eduChange(id, field, val) {
  const r = eduRows.find(x=>x.id===id);
  if (r) { r[field]=val; update(); }
}

function addCert() {
  certRows.push({id: nextCertId++, name:'', issuer:'', date:''});
  renderCert();
}
function removeCert(id) { certRows = certRows.filter(r=>r.id!==id); renderCert(); update(); }
function renderCert() {
  const el = document.getElementById('certBody');
  el.innerHTML = '';
  certRows.forEach(r => {
    const div = document.createElement('div');
    div.className = 'block-item';
    div.innerHTML = `
      <button class="btn-del" onclick="removeCert(${r.id})">×</button>
      <div class="form-row">
        <div class="form-group"><label>Certification</label><input value="${r.name}" oninput="certChange(${r.id},'name',this.value)" placeholder="Google Analytics Certified"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Issuer</label><input value="${r.issuer}" oninput="certChange(${r.id},'issuer',this.value)" placeholder="Google"></div>
        <div class="form-group"><label>Date</label><input value="${r.date}" oninput="certChange(${r.id},'date',this.value)" placeholder="2023"></div>
      </div>
    `;
    el.appendChild(div);
  });
}
function certChange(id, field, val) {
  const r = certRows.find(x=>x.id===id);
  if (r) { r[field]=val; update(); }
}

function update() {
  const g = id => document.getElementById(id);
  const v = id => (document.getElementById(id)||{}).value || '';

  const name = v('fullName') || 'Your Name';
  const title = v('jobTitle') || 'Professional Title';
  g('pName').textContent = name; g('pName2').textContent = name;
  g('pTitle').textContent = title; g('pTitle2').textContent = title;

  const contactBits = [v('email'), v('phone'), v('location'), v('website')].filter(Boolean);
  const contactHTML = contactBits.map(c=>`<span>${c}</span>`).join('<span style="opacity:.5"> · </span>');
  g('pContact').innerHTML = contactHTML;
  g('pContact2').innerHTML = contactHTML;

  g('pSummary').textContent = v('summary') || '—';

  const expHTML = expRows.map(r => {
    const lines = (r.desc||'').split('\n').map(l=>l.trim()).filter(Boolean);
    const bulletsHTML = lines.length
      ? '<ul>' + lines.map(l => `<li>${l.replace(/</g,'&lt;')}</li>`).join('') + '</ul>'
      : '';
    return `
    <div class="r-entry">
      <div class="r-entry-top">
        <div>
          <span class="r-entry-role">${r.role || 'Role'}</span>${r.org ? ' — <span class="r-entry-org">'+r.org+'</span>' : ''}
        </div>
        <div class="r-entry-date">${r.dates || ''}</div>
      </div>
      <div class="r-entry-desc">${bulletsHTML}</div>
    </div>
  `;
  }).join('');
  g('pExp').innerHTML = expHTML || '<div class="r-entry-desc">—</div>';

  const eduHTML = eduRows.map(r => `
    <div class="r-entry">
      <div class="r-entry-top">
        <div><span class="r-entry-role">${r.degree || 'Degree'}</span></div>
        <div class="r-entry-date">${r.dates || ''}</div>
      </div>
      <div class="r-entry-org">${r.school || ''}</div>
    </div>
  `).join('');
  g('pEdu').innerHTML = eduHTML || '<div class="r-entry-desc">—</div>';
  g('pEduSidebar').innerHTML = eduHTML || '<div class="r-entry-desc" style="color:#cbd5e1">—</div>';

  const certHTML = certRows.filter(r=>r.name).map(r => `
    <div class="r-entry">
      <div class="r-entry-top">
        <div><span class="r-entry-role">${r.name}</span>${r.issuer ? ' — <span class="r-entry-org">'+r.issuer+'</span>' : ''}</div>
        <div class="r-entry-date">${r.date || ''}</div>
      </div>
    </div>
  `).join('');
  g('pCert').innerHTML = certHTML || '<div class="r-entry-desc">—</div>';
  g('pCertSidebar').innerHTML = certHTML || '<div class="r-entry-desc" style="color:#cbd5e1">—</div>';

  const skillsArr = v('skills').split(',').map(s=>s.trim()).filter(Boolean);
  const skillsHTML = skillsArr.map(s=>`<span class="r-skill-pill">${s}</span>`).join('');
  g('pSkillsMain').innerHTML = skillsHTML;
  g('pSkillsSidebar').innerHTML = skillsHTML;
}

async function getCanvas() {
  return await html2canvas(document.getElementById('resumePreview'), {
    scale: 2, useCORS: true, backgroundColor: '#ffffff'
  });
}

const STOPWORDS = new Set(['the','and','a','an','of','to','in','for','with','on','at','by','is','are','as','be','or','from','this','that','will','you','your','we','our','their','it','its','into','have','has','must','also','etc','years','year','strong','using','work','working','role','team','ability','able']);

function extractKeywords(text) {
  return (text.toLowerCase().match(/[a-z][a-z0-9+.#-]{2,}/g) || [])
    .filter(w => !STOPWORDS.has(w));
}

function runATSCheck() {
  const g = id => document.getElementById(id);
  const v = id => (g(id)||{}).value || '';

  const resumeParts = [
    v('fullName'), v('jobTitle'), v('summary'), v('skills'),
    ...expRows.map(r => [r.role, r.org, r.desc].join(' ')),
    ...eduRows.map(r => [r.degree, r.school].join(' ')),
    ...certRows.map(r => [r.name, r.issuer].join(' '))
  ].join(' ');
  const resumeWords = new Set(extractKeywords(resumeParts));

  const checks = [];
  let score = 0;
  const maxScore = 100;

  // Contact info (15 pts)
  let contactPts = 0;
  if (v('email').includes('@')) contactPts += 5; else checks.push({ok:false, text:'Add a valid email address'});
  if (v('phone').trim()) contactPts += 5; else checks.push({ok:false, text:'Add a phone number'});
  if (v('location').trim()) contactPts += 5; else checks.push({ok:false, text:'Add your location (city, country)'});
  score += contactPts;
  if (contactPts === 15) checks.push({ok:true, text:'Contact details are complete'});

  // Summary (10 pts)
  const summaryWordCount = v('summary').trim().split(/\s+/).filter(Boolean).length;
  if (summaryWordCount >= 20) { score += 10; checks.push({ok:true, text:'Summary length looks good ('+summaryWordCount+' words)'}); }
  else checks.push({ok:false, text:'Summary is short — aim for 25–50 words'});

  // Experience bullets (15 pts)
  const totalBullets = expRows.reduce((acc,r)=>acc + (r.desc||'').split('\n').filter(l=>l.trim()).length, 0);
  if (expRows.length >= 1 && totalBullets >= expRows.length * 2) { score += 15; checks.push({ok:true, text:'Experience entries have enough detail ('+totalBullets+' bullet lines)'}); }
  else checks.push({ok:false, text:'Add at least 2-3 bullet points per role describing impact and results'});

  // Quantified achievements (10 pts)
  const hasNumbers = /\d/.test(expRows.map(r=>r.desc).join(' '));
  if (hasNumbers) { score += 10; checks.push({ok:true, text:'Achievements include numbers/metrics — great for ATS and recruiters'}); }
  else checks.push({ok:false, text:'Add measurable results (%, $, numbers) to your bullet points'});

  // Skills (10 pts)
  const skillsArr = v('skills').split(',').map(s=>s.trim()).filter(Boolean);
  if (skillsArr.length >= 5) { score += 10; checks.push({ok:true, text:skillsArr.length+' skills listed'}); }
  else checks.push({ok:false, text:'List at least 5 relevant skills, comma separated'});

  // Education (5 pts)
  if (eduRows.some(r=>r.degree && r.school)) { score += 5; checks.push({ok:true, text:'Education section is filled in'}); }
  else checks.push({ok:false, text:'Add at least one education entry'});

  // Section completeness (5 pts)
  if (v('jobTitle').trim()) { score += 5; checks.push({ok:true, text:'Professional title is set'}); }
  else checks.push({ok:false, text:'Add a professional title under your name'});

  // Keyword match against job description (30 pts)
  const jd = v('jobDesc').trim();
  let keywordHTML = '';
  if (jd) {
    const jdWords = extractKeywords(jd);
    const jdCounts = {};
    jdWords.forEach(w => jdCounts[w] = (jdCounts[w]||0) + 1);
    const topKeywords = Object.entries(jdCounts).sort((a,b)=>b[1]-a[1]).slice(0,20).map(e=>e[0]);
    const matched = topKeywords.filter(w => resumeWords.has(w));
    const missing = topKeywords.filter(w => !resumeWords.has(w));
    const matchPct = topKeywords.length ? matched.length / topKeywords.length : 0;
    score += Math.round(matchPct * 30);
    checks.push({ok: matchPct >= 0.5, text: Math.round(matchPct*100)+'% of top job-description keywords found in your resume'});
    keywordHTML = `
      <div style="margin-top:10px">
        <div style="font-size:11px;font-weight:700;color:#16a34a;margin-bottom:4px">MATCHED KEYWORDS</div>
        <div style="font-size:12px;color:#374151;margin-bottom:8px">${matched.length ? matched.join(', ') : '—'}</div>
        <div style="font-size:11px;font-weight:700;color:#dc2626;margin-bottom:4px">MISSING KEYWORDS</div>
        <div style="font-size:12px;color:#374151">${missing.length ? missing.join(', ') : '—'}</div>
      </div>`;
  } else {
    checks.push({ok:false, text:'Paste a job description above to score keyword match (worth 30 pts)'});
  }

  score = Math.min(score, maxScore);

  const color = score >= 80 ? '#16a34a' : score >= 55 ? '#d97706' : '#dc2626';
  const label = score >= 80 ? 'Strong match' : score >= 55 ? 'Needs improvement' : 'Weak match';

  const checksHTML = checks.map(c => `
    <div style="display:flex;gap:8px;align-items:flex-start;font-size:12px;color:#374151;margin-bottom:6px">
      <span style="color:${c.ok ? '#16a34a' : '#dc2626'};flex-shrink:0">${c.ok ? '✓' : '✗'}</span>
      <span>${c.text}</span>
    </div>`).join('');

  document.getElementById('atsResults').innerHTML = `
    <div style="border:1px solid #e2e8f0;border-radius:10px;padding:16px">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
        <div style="font-size:28px;font-weight:800;color:${color}">${score}<span style="font-size:14px;color:#94a3b8">/100</span></div>
        <div style="font-size:13px;font-weight:600;color:${color}">${label}</div>
      </div>
      ${checksHTML}
      ${keywordHTML}
    </div>`;
  document.getElementById('atsResults').style.display = 'block';
}

async function exportPDF() {
  const btn = event.target;
  const orig = btn.textContent;
  btn.textContent = '⏳ Generating...';
  btn.disabled = true;
  try {
    const canvas = await getCanvas();
    const imgData = canvas.toDataURL('image/jpeg', 1.0);
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    const w = pdf.internal.pageSize.getWidth();
    const h = (canvas.height / canvas.width) * w;
    pdf.addImage(imgData, 'JPEG', 0, 0, w, Math.min(h, pdf.internal.pageSize.getHeight()));
    const name = document.getElementById('fullName').value || 'resume';
    pdf.save(`${name.replace(/\s+/g,'_')}.pdf`);
  } finally {
    btn.textContent = orig;
    btn.disabled = false;
  }
}

async function exportPNG() {
  const canvas = await getCanvas();
  const link = document.createElement('a');
  const name = document.getElementById('fullName').value || 'resume';
  link.download = name.replace(/\s+/g,'_') + '.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function printResume() {
  const content = document.getElementById('resumePreview').outerHTML;
  const win = window.open('', '_blank');
  win.document.write(`<!DOCTYPE html><html><head><title>Resume</title><style>
    body{margin:0;font-family:Inter,sans-serif}
    ${Array.from(document.styleSheets).map(s=>{try{return Array.from(s.cssRules).map(r=>r.cssText).join('')}catch(e){return ''}}).join('')}
  </style></head><body class="${document.body.className}">${content}</body></html>`);
  win.document.close();
  win.focus();
  setTimeout(()=>{win.print();win.close();}, 500);
}

function newResume() {
  if (!confirm('Start a new resume? All current data will be cleared.')) return;
  ['fullName','jobTitle','email','phone','location','website','summary','skills'].forEach(id=>{
    const el = document.getElementById(id); if (el) el.value='';
  });
  expRows = []; eduRows = []; certRows = []; nextExpId = 1; nextEduId = 1; nextCertId = 1;
  addExp(); addExp(); addEdu(); addCert();
  document.getElementById('jobDesc').value = '';
  document.getElementById('atsResults').style.display = 'none';
  update();
}
